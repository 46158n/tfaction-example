name: list

on:
  workflow_call:
    outputs:
      targets:
        description: JSON array of changed Terraform root modules
        value: ${{ jobs.list.outputs.targets }}

jobs:
  list:
    timeout-minutes: 10
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      pull-requests: read
    outputs:
      targets: ${{ steps.list-targets.outputs.targets }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: List targets
        id: list-targets
        uses: suzuki-shunsuke/tfaction@v2.0.3
        with:
          action: list-targets
